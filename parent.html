<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>글모락 - 학부모 리포트</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Black+Han+Sans&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#f4f3ff; --surface:#fff; --surface2:#f9f8ff;
    --purple:#7c5cbf; --purple2:#a07ee0; --purple-light:#ede9fb;
    --gold:#e6a820; --gold-light:#fef9ec;
    --green:#16a34a; --green-light:#dcfce7;
    --red:#dc2626; --red-light:#fee2e2;
    --border:#e5e3f5; --text:#1a1a2e; --muted:#6b7280;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); font-family:'Noto Sans KR',sans-serif; color:var(--text); min-height:100vh; }

  /* 로그인 */
  .login-wrap { min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:24px; background:linear-gradient(135deg,#f4f3ff,#ede9fb); }
  .login-logo { font-family:'Black Han Sans',sans-serif; font-size:32px; color:var(--purple); margin-bottom:4px; }
  .login-sub { font-size:14px; color:var(--muted); margin-bottom:32px; }
  .login-card { background:white; border-radius:20px; padding:28px 24px; width:100%; max-width:380px; box-shadow:0 4px 24px rgba(124,92,191,0.12); }
  .login-card h2 { font-size:18px; font-weight:900; margin-bottom:6px; }
  .login-desc { font-size:12px; color:var(--muted); margin-bottom:20px; line-height:1.6; }
  .field { margin-bottom:14px; }
  .field label { font-size:12px; font-weight:700; color:var(--muted); display:block; margin-bottom:6px; }
  .field input, .field select { width:100%; padding:12px 14px; border:1px solid var(--border); border-radius:10px; font-family:'Noto Sans KR',sans-serif; font-size:14px; outline:none; }
  .field input:focus, .field select:focus { border-color:var(--purple); }
  .btn-login { width:100%; padding:13px; background:var(--purple); color:white; border:none; border-radius:12px; font-family:'Noto Sans KR',sans-serif; font-size:15px; font-weight:700; cursor:pointer; }
  .login-err { color:var(--red); font-size:12px; margin-top:8px; text-align:center; min-height:18px; }

  /* 앱 */
  .app-header { background:white; border-bottom:1px solid var(--border); padding:14px 20px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:50; }
  .logo { font-family:'Black Han Sans',sans-serif; font-size:18px; color:var(--purple); }
  .header-right { display:flex; align-items:center; gap:10px; }
  .parent-badge { background:var(--purple-light); color:var(--purple); font-size:12px; font-weight:700; padding:4px 10px; border-radius:20px; }
  .btn-logout { background:none; border:1px solid var(--border); border-radius:8px; padding:6px 12px; font-size:12px; color:var(--muted); cursor:pointer; font-family:'Noto Sans KR',sans-serif; }

  .wrap { max-width:680px; margin:0 auto; padding:20px 16px 60px; }

  /* 학생 선택 */
  .student-select-bar { background:white; border-radius:14px; border:1px solid var(--border); padding:14px 16px; margin-bottom:20px; display:flex; align-items:center; gap:12px; }
  .student-select-bar select { flex:1; padding:9px 12px; border:1px solid var(--border); border-radius:10px; font-family:'Noto Sans KR',sans-serif; font-size:14px; font-weight:700; outline:none; }

  /* 프로필 카드 */
  .profile-card { background:linear-gradient(135deg,var(--purple),#9b6ee0); color:white; border-radius:20px; padding:24px; margin-bottom:20px; }
  .profile-top { display:flex; align-items:center; gap:16px; margin-bottom:16px; }
  .profile-avatar { width:64px; height:64px; border-radius:16px; background:rgba(255,255,255,0.2); display:flex; align-items:center; justify-content:center; font-size:32px; flex-shrink:0; }
  .profile-name { font-size:22px; font-weight:900; margin-bottom:4px; }
  .profile-sub { font-size:13px; opacity:0.85; }
  .profile-stats { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
  .stat-box { background:rgba(255,255,255,0.15); border-radius:12px; padding:12px; text-align:center; }
  .stat-val { font-size:22px; font-weight:900; margin-bottom:2px; }
  .stat-lbl { font-size:11px; opacity:0.8; }

  /* 섹션 카드 */
  .section-card { background:white; border-radius:16px; border:1px solid var(--border); padding:18px; margin-bottom:16px; }
  .section-title { font-size:15px; font-weight:900; margin-bottom:14px; display:flex; align-items:center; gap:8px; }

  /* 숙제 달성률 */
  .hw-rate-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; margin-bottom:14px; }
  .hw-rate-box { background:var(--surface2); border-radius:12px; padding:12px; text-align:center; }
  .hw-rate-val { font-size:20px; font-weight:900; margin-bottom:2px; }
  .hw-rate-lbl { font-size:11px; color:var(--muted); }

  /* 피드백 */
  .feedback-item { border:1px solid var(--border); border-radius:12px; padding:14px; margin-bottom:10px; }
  .feedback-week { font-size:11px; font-weight:700; color:var(--purple2); margin-bottom:6px; }
  .feedback-text { font-size:13px; line-height:1.8; color:var(--text); }
  .feedback-pts { font-size:11px; color:var(--green); font-weight:700; margin-top:6px; }

  /* 읽은 책 */
  .book-item { display:flex; gap:10px; padding:10px 0; border-bottom:1px solid var(--border); align-items:center; }
  .book-item:last-child { border-bottom:none; }
  .book-cover { width:36px; height:48px; border-radius:6px; background:var(--purple-light); display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; overflow:hidden; }
  .book-cover img { width:100%; height:100%; object-fit:cover; }
  .book-info { flex:1; min-width:0; }
  .book-title { font-size:13px; font-weight:700; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .book-author { font-size:11px; color:var(--muted); margin-top:2px; }
  .book-pts { font-size:11px; color:var(--gold); font-weight:700; margin-top:2px; }

  /* 잔디 */
  .grass-grid { display:flex; gap:4px; overflow-x:auto; padding-bottom:4px; }
  .grass-week { display:flex; flex-direction:column; gap:3px; flex-shrink:0; }
  .grass-day { width:13px; height:13px; border-radius:3px; }

  /* 기숙사 뱃지 */
  .house-badge-lg { display:inline-flex; align-items:center; gap:6px; padding:8px 14px; border-radius:12px; font-weight:700; font-size:13px; }

  /* 빙고 진행률 */
  .bingo-mini { display:grid; grid-template-columns:repeat(4,1fr); gap:4px; }
  .bingo-cell-mini { aspect-ratio:1; border-radius:6px; border:1px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:8px; font-weight:700; text-align:center; padding:2px; line-height:1.3; background:var(--surface2); color:var(--muted); }
  .bingo-cell-mini.done { background:rgba(124,92,191,0.15); border-color:var(--purple2); color:var(--purple); }
  .bingo-cell-mini.free { background:rgba(245,200,66,0.15); border-color:var(--gold); color:var(--gold); }

  .loading { text-align:center; padding:40px; color:var(--muted); font-size:14px; }
  .empty { text-align:center; padding:20px; color:var(--muted); font-size:13px; }
</style>
</head>
<body>

<!-- 로그인 -->
<div id="loginWrap" class="login-wrap">
  <div class="login-logo">📚 글모락</div>
  <div class="login-sub">학부모 리포트</div>
  <div class="login-card">
    <h2>👨‍👩‍👧 학부모 로그인</h2>
    <div class="login-desc">자녀의 글모락 이메일과 비밀번호로 로그인하시면<br>학업 현황을 확인하실 수 있어요.</div>
    <div class="field"><label>자녀 이메일</label><input type="email" id="loginEmail" placeholder="자녀 계정 이메일"></div>
    <div class="field"><label>비밀번호</label><input type="password" id="loginPw" placeholder="비밀번호"></div>
    <button class="btn-login" id="btnLogin">확인하기</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<!-- 앱 -->
<div id="appWrap" style="display:none;">
  <div class="app-header">
    <div class="logo">📚 글모락 리포트</div>
    <div class="header-right">
      <span class="parent-badge">👨‍👩‍👧 학부모</span>
      <button class="btn-logout" id="btnLogout">나가기</button>
    </div>
  </div>

  <div class="wrap">
    <div id="reportContent"><div class="loading">불러오는 중...</div></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, collection, getDocs, query, where, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyB_f-U4h2PMzDv2zHhH0AEtffr3XfGYxsQ",
  authDomain: "chaek-mabeopsa.firebaseapp.com",
  projectId: "chaek-mabeopsa",
  storageBucket: "chaek-mabeopsa.firebasestorage.app",
  messagingSenderId: "957424809777",
  appId: "1:957424809777:web:7a67c94015066703d32210"
});
const auth = getAuth(app);
const db = getFirestore(app);

const EMOJIS = ['🌱','📖','✨','🔮','🧙','⚡','🌟','👑'];
const HOUSES = {
  hyunmu:     {name:'현무단', emoji:'🐢', desc:'북방 · 흑(黑)', hex:'#94a3b8', bg:'rgba(30,30,50,0.5)',     border:'rgba(148,163,184,0.5)'},
  cheongryong:{name:'청룡단', emoji:'🐉', desc:'동방 · 청(靑)', hex:'#60a5fa', bg:'rgba(96,165,250,0.15)',  border:'rgba(96,165,250,0.4)'},
  jujak:      {name:'주작단', emoji:'🦅', desc:'남방 · 적(赤)', hex:'#f87171', bg:'rgba(248,113,113,0.15)', border:'rgba(248,113,113,0.4)'},
  baekho:     {name:'백호단', emoji:'🐯', desc:'서방 · 백(白)', hex:'#e2e8f0', bg:'rgba(226,232,240,0.15)', border:'rgba(226,232,240,0.6)'},
  hwangryong: {name:'황룡',   emoji:'🐲', desc:'중앙 · 황(黃)', hex:'#f59e0b', bg:'rgba(251,191,36,0.2)',  border:'rgba(251,191,36,0.6)'},
  // 옛날 키 호환
  cheong:     {name:'청룡단', emoji:'🐉', desc:'동방 · 청(靑)', hex:'#60a5fa', bg:'rgba(96,165,250,0.15)',  border:'rgba(96,165,250,0.4)'},
  jeok:       {name:'주작단', emoji:'🦅', desc:'남방 · 적(赤)', hex:'#f87171', bg:'rgba(248,113,113,0.15)', border:'rgba(248,113,113,0.4)'},
  baek:       {name:'백호단', emoji:'🐯', desc:'서방 · 백(白)', hex:'#e2e8f0', bg:'rgba(226,232,240,0.15)', border:'rgba(226,232,240,0.6)'},
  heuk:       {name:'현무단', emoji:'🐢', desc:'북방 · 흑(黑)', hex:'#94a3b8', bg:'rgba(30,30,50,0.5)',     border:'rgba(148,163,184,0.5)'},
};
function getLv(pts){const L=[0,500,1500,3000,5000,8000,12000,18000];let l=0;for(const t of L)if(pts>=t)l++;return Math.min(Math.max(l,1),8);}
function getTitle(pts){const T=['📖 독서 시작','🌱 새싹 독자','📚 책 애호가','🔮 현자 견습','✨ 책의 현자','🧙 책의 마법사','🧝 대마법사','👑 책의 왕'];return T[getLv(pts)-1]||T[0];}

document.getElementById('btnLogin').addEventListener('click', async () => {
  const email = document.getElementById('loginEmail').value.trim();
  const pw = document.getElementById('loginPw').value;
  const err = document.getElementById('loginErr');
  err.textContent = '';
  try {
    await signInWithEmailAndPassword(auth, email, pw);
  } catch(e) {
    err.textContent = '이메일 또는 비밀번호를 확인해주세요.';
  }
});
document.getElementById('loginPw').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('btnLogin').click(); });
document.getElementById('btnLogout').addEventListener('click', () => signOut(auth));

onAuthStateChanged(auth, async user => {
  if(user) {
    document.getElementById('loginWrap').style.display = 'none';
    document.getElementById('appWrap').style.display = 'block';
    await loadReport(user.uid);
  } else {
    document.getElementById('loginWrap').style.display = 'flex';
    document.getElementById('appWrap').style.display = 'none';
  }
});

async function loadReport(uid) {
  const el = document.getElementById('reportContent');
  el.innerHTML = '<div class="loading">리포트 불러오는 중...</div>';
  try {
    // 학생 정보
    const userSnap = await getDoc(doc(db,'users',uid));
    if(!userSnap.exists()) { el.innerHTML = '<div class="empty">학생 정보를 찾을 수 없어요.</div>'; return; }
    const u = userSnap.data();
    const userData = u; // alias for compatibility
    const pts = Math.max(u.points||0, 0);
    const lv = getLv(pts);
    const house = u.house && HOUSES[u.house] ? HOUSES[u.house] : null;

    // 읽은 책
    const booksSnap = await getDocs(query(collection(db,'books'), where('userId','==',uid), where('status','==','approved')));
    const books = booksSnap.docs.map(d=>d.data()).sort((a,b)=>{
      const ta = a.approvedAt?.toDate?.()??new Date(0);
      const tb = b.approvedAt?.toDate?.()??new Date(0);
      return tb-ta;
    });

    // 전체 랭킹
    const allUsers = await getDocs(collection(db,'users'));
    const sorted = allUsers.docs.map(d=>d.data()).sort((a,b)=>(b.points||0)-(a.points||0));
    const rank = sorted.findIndex(s=>s.points===pts && s.name===u.name) + 1;

    // 숙제 현황
    const hwSnap = await getDocs(query(collection(db,'studentHw'), where('userId','==',uid)));
    const hwDocs = hwSnap.docs.map(d=>({id:d.id,...d.data()})).filter(d=>d.weekStart).sort((a,b)=>b.weekStart.localeCompare(a.weekStart));

    // 날짜별 달성률
    const dayRates = {};
    hwDocs.forEach(doc => {
      const dayChecks = doc.dayChecks || {};
      const items = Object.keys(dayChecks);
      if(!items.length) return;
      const mon = new Date(doc.weekStart);
      for(let di=0; di<5; di++) {
        const d = new Date(mon); d.setDate(mon.getDate()+di);
        const key = d.toISOString().slice(0,10);
        let done=0;
        items.forEach(item => { if(dayChecks[item]?.[di]) done++; });
        dayRates[key] = Math.round((done/items.length)*100);
      }
    });

    // 주간 피드백 (승인된 것)
    const feedbacks = hwDocs.filter(d=>d.hwApproved && d.aiFeedback).slice(0,5);

    // 이번 주 달성률
    const today = new Date();
    const dayOfWeek = today.getDay();
    const mon = new Date(today); mon.setDate(today.getDate()-(dayOfWeek===0?6:dayOfWeek-1));
    const weekStart = mon.toISOString().slice(0,10);
    let wDone=0,wTotal=0;
    for(let di=0;di<5;di++){
      const d=new Date(mon);d.setDate(mon.getDate()+di);
      const k=d.toISOString().slice(0,10);
      if(dayRates[k]!==undefined){wDone+=dayRates[k];wTotal++;}
    }
    const weekRate = wTotal>0?Math.round(wDone/wTotal):null;

    // 이번 달
    const mKeys = Object.keys(dayRates).filter(k=>{const d=new Date(k);return d.getMonth()===today.getMonth()&&d.getFullYear()===today.getFullYear();});
    const monthRate = mKeys.length>0?Math.round(mKeys.reduce((s,k)=>s+dayRates[k],0)/mKeys.length):null;

    // 수업 후기 (교시별 구조 지원)
    const reviewSnap = await getDocs(collection(db,'classReview'));
    const reviewRows = [];
    reviewSnap.docs.forEach(d => {
      const data = d.data();
      const rec = (data.records||{})[uid];
      if(!rec) return;
      const periods = rec.periods || {};
      // 교시별 평균 계산
      const allIdiom   = [1,2,3].map(p=>(periods[p]||{}).idiomScore).filter(v=>v!=null);
      const allWord    = [1,2,3].map(p=>(periods[p]||{}).wordScore).filter(v=>v!=null);
      const allWeekly  = [1,2,3].map(p=>(periods[p]||{}).weeklyTest).filter(v=>v!=null);
      const allRegular = [1,2,3].map(p=>(periods[p]||{}).regularTest).filter(v=>v!=null);
      reviewRows.push({
        week: data.week||d.id,
        cls: data.cls||'',
        // 호환용 (루트 레벨)
        idiomScore:  allIdiom.length   ? Math.round(allIdiom.reduce((a,b)=>a+b,0)/allIdiom.length)   : rec.idiomScore ?? null,
        wordScore:   allWord.length    ? Math.round(allWord.reduce((a,b)=>a+b,0)/allWord.length)      : rec.wordScore  ?? null,
        weeklyTest:  allWeekly.length  ? allWeekly[allWeekly.length-1]  : null,
        regularTest: allRegular.length ? allRegular[allRegular.length-1]: null,
        memo: rec.summaryComment || rec.memo || '',
        hwRate: rec.hwRate ?? null,
        periods: periods,
      });
    });
    reviewRows.sort((a,b)=>b.week.localeCompare(a.week));

    // 수능 진도
    let parentSnBooks = [];
    try {
      const snSnap2 = await getDocs(query(collection(db,'suneungProgress'), where('uid','==',uid)));
      parentSnBooks = snSnap2.docs.map(d=>d.data());
    } catch(e) {}

    // 지난 토론 결과
    let debateHistories = [];
    try {
      const dhSnap = await getDocs(query(collection(db,'debateHistory'), orderBy('archivedAt','desc')));
      debateHistories = dhSnap.docs.map(d=>({id:d.id,...d.data()})).slice(0,3);
    } catch(e) {}

    // 월간 리포트
    let monthReport = null;
    try {
      const now4 = new Date();
      const curMonth4 = now4.getFullYear()+'년 '+(now4.getMonth()+1)+'월';
      const uCls4 = userData?.className || userData?.class || '';
      if(uCls4) {
        const mrSnap4 = await getDocs(query(collection(db,'monthReports'), where('cls','==',uCls4)));
        const reports4 = mrSnap4.docs.map(d=>d.data()).sort((a,b)=>(b.updatedAt?.toMillis?.()??0)-(a.updatedAt?.toMillis?.()??0));
        monthReport = reports4.find(r=>r.month===curMonth4) || reports4[0] || null;
      }
    } catch(e) {}

    // 수업 기록
    let parentClassNotes = [];
    try {
      const cnSnap2 = await getDocs(collection(db,'classNotes'));
      const uCls = userData?.className || userData?.class || '';
      parentClassNotes = cnSnap2.docs.map(d=>d.data())
        .filter(d => !d.cls || d.cls===uCls || d.cls==='all')
        .sort((a,b)=>(b.updatedAt?.toMillis?.()??0)-(a.updatedAt?.toMillis?.()??0))
        .slice(0,3);
    } catch(e) {}

    // 시험 대비 플랜
    const cls4Exam = userData?.className || userData?.class || '';
    let examData = null;
    if(cls4Exam) {
      try {
        const ep1 = await getDoc(doc(db,'examPlans','examplan_class_'+cls4Exam.replace(/[^a-zA-Z0-9가-힣_]/g,'_')));
        if(ep1.exists()) examData = ep1.data();
        if(!examData) {
          const ep2 = await getDoc(doc(db,'examPlans','examplan_'+uid));
          if(ep2.exists()) examData = ep2.data();
        }
      } catch(e) {}
    }

    // 공부 현황 (읽는 중 / 보는 중 / 문제집)
    const [readingSnap, watchingSnap, workbookSnap] = await Promise.all([
      getDocs(query(collection(db,'currentReading'), where('userId','==',uid))),
      getDocs(query(collection(db,'currentWatching'), where('userId','==',uid))),
      getDocs(query(collection(db,'workbooks'), where('userId','==',uid))),
    ]);
    const readingItems  = readingSnap.docs.map(d=>({id:d.id,...d.data()}));
    const watchingItems = watchingSnap.docs.map(d=>({id:d.id,...d.data()}));
    const workbookItems = workbookSnap.docs.map(d=>({id:d.id,...d.data()}));

    // 이번 달 아이 우체통 글
    const thisMonth = new Date().toISOString().slice(0,7); // YYYY-MM
    const mailSnap = await getDocs(query(collection(db,'mailboxLetters'), where('userId','==',uid)));
    const myLetters = mailSnap.docs.map(d=>d.data())
      .filter(l => l.date && l.date.startsWith(thisMonth))
      .sort((a,b)=>(b.createdAt?.toMillis?.()??0)-(a.createdAt?.toMillis?.()??0));

    // 진도 현황
    const progressSnap = await getDocs(query(collection(db,'progress'), where('userId','==',uid)));
    const progressBooks = progressSnap.docs.map(d=>({id:d.id,...d.data()}));

    // 빙고
    const bingoSnap = await getDocs(query(collection(db,'bingo'), where('userId','==',uid)));
    const bingoData = bingoSnap.empty ? null : bingoSnap.docs[0].data();
    const bossSnap = await getDoc(doc(db,'settings','bingo'));
    const bingoMissions = bossSnap.exists() ? (bossSnap.data().missions||[]) : [];

    // 최근 12주 잔디
    const last12 = [];
    for(let w=11;w>=0;w--){
      const m=new Date(mon);m.setDate(mon.getDate()-w*7);
      const days=[];
      for(let di=0;di<5;di++){const d=new Date(m);d.setDate(m.getDate()+di);const k=d.toISOString().slice(0,10);days.push({date:k,rate:dayRates[k]??null,future:d>today});}
      last12.push(days);
    }
    const rateColor = r=>r===null?'#e5e7eb':r>=80?'#16a34a':r>=50?'#fbbf24':r>=20?'#f87171':'#fecaca';

    el.innerHTML = `
      <!-- 프로필 -->
      <div class="profile-card">
        <div class="profile-top">
          <div class="profile-avatar">${EMOJIS[lv-1]}</div>
          <div>
            <div class="profile-name">${u.name||'학생'}</div>
            <div class="profile-sub">${u.className||''} · ${getTitle(pts)} · Lv.${lv}</div>
            ${house?`<div style="margin-top:6px;display:inline-flex;align-items:center;gap:4px;background:rgba(255,255,255,0.2);padding:4px 10px;border-radius:10px;font-size:12px;font-weight:700;">${house.emoji} ${house.name}</div>`:''}
          </div>
        </div>
        <div class="profile-stats">
          <div class="stat-box"><div class="stat-val">${pts.toLocaleString()}</div><div class="stat-lbl">총 포인트</div></div>
          <div class="stat-box"><div class="stat-val">${books.length}</div><div class="stat-lbl">읽은 책</div></div>
          <div class="stat-box"><div class="stat-val">${rank > 0 ? rank+'위' : '-'}</div><div class="stat-lbl">전체 랭킹</div></div>
        </div>
      </div>

      <!-- 숙제 달성률 -->
      <div class="section-card">
        <div class="section-title">📝 숙제 달성률</div>
        <div class="hw-rate-grid">
          ${[
            {label:'이번 주',rate:weekRate,icon:'📆'},
            {label:'이번 달',rate:monthRate,icon:'🗓️'},
          ].map(({label,rate,icon})=>`
            <div class="hw-rate-box">
              <div style="font-size:20px;margin-bottom:4px;">${icon}</div>
              <div class="hw-rate-val" style="color:${rate===null?'var(--muted)':rate>=80?'var(--green)':rate>=50?'var(--gold)':'var(--red)'};">
                ${rate===null?'-':rate+'%'}
              </div>
              <div class="hw-rate-lbl">${label}</div>
            </div>`).join('')}
        </div>

        <!-- 잔디 -->
        <div style="margin-top:4px;">
          <div style="font-size:12px;font-weight:700;color:var(--muted);margin-bottom:8px;">최근 12주 출석 현황</div>
          <div class="grass-grid">
            ${last12.map(week=>`
              <div class="grass-week">
                ${week.map(day=>`<div class="grass-day" style="background:${day.future?'#f3f4f6':rateColor(day.rate)};" title="${day.date}: ${day.rate!==null?day.rate+'%':'데이터 없음'}"></div>`).join('')}
              </div>`).join('')}
          </div>
          <div style="display:flex;gap:5px;align-items:center;margin-top:8px;font-size:10px;color:var(--muted);">
            <span>낮음</span>
            ${['#fecaca','#f87171','#fbbf24','#16a34a'].map(c=>`<div style="width:11px;height:11px;border-radius:2px;background:${c};"></div>`).join('')}
            <span>높음</span>
          </div>
        </div>
      </div>

      <!-- 선생님 피드백 -->
      ${feedbacks.length ? `
      <div class="section-card">
        <div class="section-title">💬 선생님 피드백</div>
        ${feedbacks.map(f=>`
          <div class="feedback-item">
            <div class="feedback-week">📅 ${f.weekStart||''} 주차</div>
            <div class="feedback-text">${f.aiFeedback||f.teacherComment||''}</div>
            ${f.hwPtsAwarded?`<div class="feedback-pts">+${f.hwPtsAwarded}pt 획득</div>`:''}
          </div>`).join('')}
      </div>` : ''}

      <div id="parentProgressSection"></div>

      <div id="parentMonthReport"></div>
      <div id="parentDebateHistory"></div>
      <div id="parentSuneung"></div>
      <div id="parentClassNotes"></div>
      <div id="parentExamPlan"></div>
      <div id="parentStudyStatus"></div>
      <div id="parentReviewSection"></div>
      <div id="parentLetterSection"></div>
      <!-- 읽은 책 -->
      <div class="section-card">
        <div class="section-title">📚 읽은 책 (\${books.length}권)</div>
        ${books.length===0?'<div class="empty">아직 읽은 책이 없어요!</div>':
          books.slice(0,10).map(b=>`
            <div class="book-item">
              <div class="book-cover">${b.coverUrl?`<img src="${b.coverUrl}" onerror="this.parentNode.textContent='📖'">`:'📖'}</div>
              <div class="book-info">
                <div class="book-title">${b.title}</div>
                <div class="book-author">${b.author||''}</div>
                ${b.teacherComment?`<div style="font-size:11px;color:var(--purple2);margin-top:3px;">💬 ${b.teacherComment}</div>`:''}
              </div>
              <div class="book-pts">+${b.pointsAwarded||b.points||0}pt</div>
            </div>`).join('')}
        ${books.length>10?`<div style="text-align:center;font-size:12px;color:var(--muted);padding-top:10px;">외 ${books.length-10}권 더...</div>`:''}
      </div>

      <!-- 기숙사 -->
      ${house ? `
      <div class="section-card">
        <div class="section-title">🏰 기숙사</div>
        <div class="house-badge-lg" style="background:${house.bg};color:${house.hex};border:1px solid ${house.border};">
          <span style="font-size:24px;">${house.emoji}</span>
          <div>
            <div style="font-size:14px;font-weight:900;">${house.emoji} ${house.name}</div>
            <div style="font-size:11px;opacity:0.75;">${house.desc}</div>
            <div style="font-size:11px;opacity:0.8;">${house.desc||''}</div>
          </div>
        </div>
      </div>` : ''}

      <!-- 독서 빙고 -->
      ${bingoMissions.length>0?`
      <div class="section-card">
        <div class="section-title">🎯 독서 빙고</div>
        ${bingoData?`<div style="font-size:13px;color:var(--green);font-weight:700;margin-bottom:10px;">✅ ${(bingoData.checked||[]).length}칸 달성!</div>`:''}
        <div class="bingo-mini">
          ${bingoMissions.map((m,i)=>{
            const isFree=m.includes('FREE');
            const isDone=(bingoData?.checked||[]).includes(i);
            return `<div class="bingo-cell-mini ${isFree?'free':isDone?'done':''}">${isFree?'⭐':isDone?'✅':m.slice(0,6)}</div>`;
          }).join('')}
        </div>
      </div>`:''}

      <!-- 안내 -->
      <div style="background:var(--purple-light);border-radius:12px;padding:14px 16px;text-align:center;font-size:12px;color:var(--purple);line-height:1.8;">
        📱 글모락 앱에서 더 자세한 내용을 확인할 수 있어요!<br>
        <strong>https://geulmorak-coder.github.io/geulmoak/</strong>
      </div>`;

    // 각 섹션 별도 렌더링 (template literal 이스케이프 방지)
    renderProgressSection(progressBooks);
    renderReviewSection(reviewRows);
    renderLetterSection(myLetters);

  } catch(e) {
    el.innerHTML = `<div class="empty">불러오기 실패: ${e.message}</div>`;
  }
}
</script>
</body>
</html>
