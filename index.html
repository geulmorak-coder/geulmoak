<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>글모락 - 국어학원</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Black+Han+Sans&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0d0d1a; --surface:#161628; --surface2:#1e1e38;
    --gold:#f5c842; --gold2:#e6a820; --purple:#7c5cbf; --purple2:#a07ee0;
    --teal:#2dd4bf; --red:#f87171; --green:#4ade80;
    --text:#e8e8f0; --muted:#8888aa; --border:rgba(255,255,255,0.08);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Noto Sans KR',sans-serif; min-height:100vh; }
  .stars {
    position:fixed; inset:0; pointer-events:none; z-index:0;
    background-image:
      radial-gradient(1px 1px at 10% 15%,rgba(255,255,255,0.6) 0%,transparent 100%),
      radial-gradient(1px 1px at 25% 40%,rgba(255,255,255,0.4) 0%,transparent 100%),
      radial-gradient(1px 1px at 60% 10%,rgba(255,255,255,0.5) 0%,transparent 100%),
      radial-gradient(1px 1px at 80% 30%,rgba(255,255,255,0.3) 0%,transparent 100%),
      radial-gradient(1px 1px at 45% 70%,rgba(255,255,255,0.5) 0%,transparent 100%);
  }
  .wrap { position:relative; z-index:1; max-width:480px; margin:0 auto; padding:0 16px 80px; }
  .screen { display:none; }
  .screen.on { display:flex; }

  /* 로그인 */
  .auth-screen {
    min-height:100vh; flex-direction:column;
    align-items:center; justify-content:center; padding:20px;
    position:relative; z-index:1;
  }
  .login-logo { font-family:'Black Han Sans',sans-serif; font-size:32px; color:var(--gold); margin-bottom:8px; }
  .login-sub { font-size:14px; color:var(--muted); margin-bottom:40px; }
  .login-card { background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:28px 24px; width:100%; max-width:360px; }
  .login-title { font-size:18px; font-weight:900; margin-bottom:20px; text-align:center; }
  .inp-group { margin-bottom:14px; }
  .inp-label { font-size:12px; color:var(--muted); margin-bottom:6px; }
  .inp {
    width:100%; padding:12px 14px;
    background:rgba(255,255,255,0.06); border:1px solid var(--border);
    border-radius:10px; color:var(--text);
    font-family:'Noto Sans KR',sans-serif; font-size:14px; outline:none;
    transition:border-color 0.2s;
  }
  .inp:focus { border-color:var(--purple2); }
  .btn-primary {
    width:100%; padding:14px;
    background:linear-gradient(135deg,var(--purple),#9b6ee0);
    border:none; border-radius:12px; color:white;
    font-family:'Noto Sans KR',sans-serif; font-size:15px; font-weight:700;
    cursor:pointer; margin-top:4px; transition:opacity 0.15s;
  }
  .btn-primary:active { opacity:0.85; }
  .btn-ghost {
    width:100%; padding:12px;
    background:rgba(255,255,255,0.05); border:1px solid var(--border);
    border-radius:12px; color:var(--muted);
    font-family:'Noto Sans KR',sans-serif; font-size:14px; cursor:pointer;
  }
  .divider { text-align:center; color:var(--muted); font-size:12px; margin:14px 0; }

  /* 메인 앱 */
  .app-screen { flex-direction:column; }
  header { display:flex; align-items:center; justify-content:space-between; padding:20px 0 12px; }
  .logo { font-family:'Black Han Sans',sans-serif; font-size:18px; color:var(--gold); }
  .btn-logout { font-size:12px; color:var(--muted); background:none; border:none; cursor:pointer; font-family:'Noto Sans KR',sans-serif; }

  .hero-card {
    background:linear-gradient(135deg,#1a1a35,#2a1a4a);
    border:1px solid rgba(124,92,191,0.4); border-radius:20px;
    padding:20px; margin-bottom:20px; position:relative; overflow:hidden;
  }
  .hero-card::before {
    content:''; position:absolute; top:-40px; right:-40px;
    width:140px; height:140px; border-radius:50%;
    background:radial-gradient(circle,rgba(124,92,191,0.3) 0%,transparent 70%);
  }
  .hero-top { display:flex; align-items:center; gap:16px; margin-bottom:16px; }
  .avatar {
    width:72px; height:72px; border-radius:16px;
    background:linear-gradient(135deg,#2a1a4a,#4a2a7a);
    border:2px solid var(--purple2);
    display:flex; align-items:center; justify-content:center;
    font-size:36px; position:relative; flex-shrink:0;
  }
  .lv-badge {
    position:absolute; bottom:-6px; right:-6px;
    background:var(--gold); color:#1a1a00;
    font-size:10px; font-weight:900; padding:2px 6px; border-radius:6px;
  }
  .hero-name { font-size:20px; font-weight:900; margin-bottom:2px; }
  .hero-title { font-size:12px; color:var(--purple2); margin-bottom:8px; }
  .rank-badge {
    display:inline-flex; align-items:center; gap:4px;
    background:rgba(245,200,66,0.15); border:1px solid rgba(245,200,66,0.4);
    color:var(--gold); font-size:11px; font-weight:700; padding:3px 8px; border-radius:20px;
  }
  .xp-label { display:flex; justify-content:space-between; font-size:11px; color:var(--muted); margin-bottom:6px; }
  .xp-bar { height:8px; background:rgba(255,255,255,0.08); border-radius:4px; overflow:hidden; }
  .xp-fill { height:100%; border-radius:4px; background:linear-gradient(90deg,var(--purple),var(--purple2)); transition:width 1s ease-out; }
  .stats { display:flex; gap:10px; margin-top:14px; }
  .stat { flex:1; background:rgba(255,255,255,0.05); border-radius:10px; padding:10px 8px; text-align:center; }
  .stat-val { font-size:20px; font-weight:900; color:var(--gold); }
  .stat-lbl { font-size:10px; color:var(--muted); margin-top:2px; }

  .sec-title { font-size:13px; font-weight:700; color:var(--muted); letter-spacing:1px; margin-bottom:12px; display:flex; align-items:center; gap:8px; }
  .sec-title::after { content:''; flex:1; height:1px; background:var(--border); }

  .add-book-btn {
    width:100%; padding:14px;
    background:linear-gradient(135deg,var(--purple),#9b6ee0);
    border:none; border-radius:14px; color:white;
    font-family:'Noto Sans KR',sans-serif; font-size:15px; font-weight:700;
    cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px;
    margin-bottom:20px; transition:transform 0.15s,opacity 0.15s;
  }
  .add-book-btn:active { transform:scale(0.97); opacity:0.9; }

  .book-list { display:flex; flex-direction:column; gap:10px; margin-bottom:20px; }
  .book-item { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:14px; display:flex; align-items:center; gap:12px; animation:fadeIn 0.3s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} }
  .book-cover { width:44px; height:58px; border-radius:6px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:22px; }
  .c1{background:linear-gradient(135deg,#3b1f6a,#6b3fa0)} .c2{background:linear-gradient(135deg,#1a3a4a,#2a6a7a)} .c3{background:linear-gradient(135deg,#3a1a1a,#7a3a2a)} .c4{background:linear-gradient(135deg,#1a3a1a,#2a7a3a)}
  .book-meta { flex:1; }
  .book-title-text { font-size:14px; font-weight:700; margin-bottom:3px; }
  .book-author { font-size:11px; color:var(--muted); margin-bottom:6px; }
  .book-pts { display:inline-flex; align-items:center; gap:4px; font-size:12px; font-weight:700; color:var(--gold); }
  .book-status { font-size:11px; font-weight:700; padding:3px 8px; border-radius:20px; white-space:nowrap; }
  .s-ok{background:rgba(74,222,128,0.15);color:var(--green)} .s-wait{background:rgba(248,180,113,0.15);color:#f8b471}

  .ranking-list { display:flex; flex-direction:column; gap:8px; margin-bottom:20px; }
  .rank-item { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:12px 14px; display:flex; align-items:center; gap:12px; }
  .rank-item.me { border-color:rgba(124,92,191,0.5); background:rgba(124,92,191,0.1); }
  .rank-num { width:28px; text-align:center; font-size:16px; font-weight:900; flex-shrink:0; }
  .r1{color:var(--gold)} .r2{color:#c0c0c0} .r3{color:#cd7f32} .r-etc{color:var(--muted);font-size:13px}
  .rank-avatar { width:36px; height:36px; border-radius:10px; font-size:20px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .rank-score { font-size:16px; font-weight:900; color:var(--gold); }

  .bottom-tab {
    position:fixed; bottom:0; left:50%; transform:translateX(-50%);
    width:100%; max-width:480px;
    background:rgba(13,13,26,0.95); border-top:1px solid var(--border);
    display:flex; padding:8px 0 16px; backdrop-filter:blur(12px); z-index:100;
  }
  .tab-btn { flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; background:none; border:none; cursor:pointer; font-family:'Noto Sans KR',sans-serif; font-size:10px; color:var(--muted); padding:6px 0; }
  .tab-btn.active { color:var(--purple2); }
  .tab-icon { font-size:20px; }

  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:200; align-items:flex-end; justify-content:center; backdrop-filter:blur(4px); }
  .modal-overlay.open { display:flex; }
  .modal { background:var(--surface2); border:1px solid var(--border); border-radius:24px 24px 0 0; padding:24px 20px 40px; width:100%; max-width:480px; animation:slideUp 0.3s ease; }
  @keyframes slideUp { from{transform:translateY(100%)} }
  .modal-handle { width:40px; height:4px; background:var(--border); border-radius:2px; margin:0 auto 20px; }
  .modal-title { font-size:18px; font-weight:900; margin-bottom:20px; }
  .star-group { display:flex; gap:6px; margin:8px 0 14px; }
  .star-btn { font-size:24px; background:none; border:none; cursor:pointer; transition:transform 0.1s; padding:0; line-height:1; filter:grayscale(1); opacity:0.4; }
  .star-btn.on { filter:none; opacity:1; transform:scale(1.1); }

  .btn-cancel { width:100%; padding:12px; background:none; border:none; color:var(--muted); font-family:'Noto Sans KR',sans-serif; font-size:14px; cursor:pointer; margin-top:8px; }

  /* 승인 알림 팝업 */
  .approval-popup {
    display:none; position:fixed; inset:0; z-index:300;
    background:rgba(0,0,0,0.75); backdrop-filter:blur(6px);
    align-items:center; justify-content:center;
  }
  .approval-popup.show { display:flex; }
  .approval-box {
    background:var(--surface2); border:1px solid var(--border);
    border-radius:24px; padding:32px 28px; text-align:center;
    max-width:320px; width:90%; animation:popIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes popIn { from { transform:scale(0.7); opacity:0; } to { transform:scale(1); opacity:1; } }
  .popup-emoji { font-size:56px; margin-bottom:12px; }
  .popup-title { font-size:20px; font-weight:900; color:var(--gold); margin-bottom:8px; }
  .popup-book { font-size:15px; font-weight:700; margin-bottom:4px; }
  .popup-pts { font-size:24px; font-weight:900; color:var(--green); margin-bottom:20px; }
  .popup-btn { width:100%; padding:13px; background:var(--purple); color:white; border:none; border-radius:12px; font-family:'Noto Sans KR',sans-serif; font-size:15px; font-weight:700; cursor:pointer; }

  .toast { position:fixed; top:20px; left:50%; transform:translateX(-50%) translateY(-80px); background:linear-gradient(135deg,var(--gold2),var(--gold)); color:#1a1a00; font-weight:900; font-size:14px; padding:12px 24px; border-radius:30px; z-index:300; transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1); white-space:nowrap; }
  .toast.show { transform:translateX(-50%) translateY(0); }
  .loading { text-align:center; padding:30px; color:var(--muted); font-size:14px; }
  .empty-state { text-align:center; padding:30px; color:var(--muted); font-size:14px; line-height:1.8; }
</style>
</head>
<body>
<div class="stars"></div>

<!-- 로그인 -->
<div class="screen auth-screen on" id="loginScreen">
  <div class="login-logo">📚 글모락</div>
  <div class="login-sub">글모락 독서 RPG</div>
  <div class="login-card">
    <div class="login-title">로그인</div>
    <div class="inp-group"><div class="inp-label">이메일</div><input class="inp" type="email" id="loginEmail" placeholder="example@email.com"></div>
    <div class="inp-group"><div class="inp-label">비밀번호</div><input class="inp" type="password" id="loginPw" placeholder="비밀번호 입력"></div>
    <button class="btn-primary" id="btnLogin">로그인</button>
    <div class="divider">또는</div>
    <button class="btn-ghost" id="btnGoSignup">처음 오셨나요? 회원가입</button>
  </div>
</div>

<!-- 회원가입 -->
<div class="screen auth-screen" id="signupScreen">
  <div class="login-logo">📚 글모락</div>
  <div class="login-sub">회원가입</div>
  <div class="login-card">
    <div class="login-title">새 계정 만들기</div>
    <div class="inp-group"><div class="inp-label">이름 (닉네임)</div><input class="inp" type="text" id="signupName" placeholder="예: 김민준"></div>
    <div class="inp-group"><div class="inp-label">이메일</div><input class="inp" type="email" id="signupEmail" placeholder="example@email.com"></div>
    <div class="inp-group"><div class="inp-label">비밀번호</div><input class="inp" type="password" id="signupPw" placeholder="6자 이상"></div>
    <button class="btn-primary" id="btnSignup">회원가입</button>
    <div class="divider"></div>
    <button class="btn-ghost" id="btnGoLogin">이미 계정이 있어요</button>
  </div>
</div>

<!-- 메인 앱 -->
<div class="screen app-screen" id="appScreen">
  <div class="wrap">
    <header>
      <div class="logo">📚 글모락</div>
      <button class="btn-logout" id="btnLogout">로그아웃</button>
    </header>
    <div class="hero-card">
      <div class="hero-top">
        <div class="avatar" id="myAvatar">🧙<div class="lv-badge" id="myLevel">Lv.1</div></div>
        <div>
          <div class="hero-name" id="myName">불러오는 중...</div>
          <div class="hero-title" id="myTitle">📖 독서 시작</div>
          <div class="rank-badge" id="myRank">🏆 순위 계산 중</div>
        </div>
      </div>
      <div>
        <div class="xp-label"><span>다음 레벨까지</span><span style="color:var(--purple2);font-weight:700" id="xpText">0 / 500 XP</span></div>
        <div class="xp-bar"><div class="xp-fill" id="xpFill" style="width:0%"></div></div>
      </div>
      <div class="stats">
        <div class="stat"><div class="stat-val" id="statBooks">0</div><div class="stat-lbl">읽은 책</div></div>
        <div class="stat"><div class="stat-val" style="color:var(--teal)" id="statPts">0</div><div class="stat-lbl">총 포인트</div></div>
        <div class="stat"><div class="stat-val" style="color:var(--red)" id="statRemain">-</div><div class="stat-lbl">남은 책</div></div>
      </div>
    </div>
    <button class="add-book-btn" id="btnAddBook">✨ 읽은 책 등록하기</button>
    <div class="sec-title">최근 읽은 책</div>
    <div class="book-list" id="bookList"><div class="loading">불러오는 중...</div></div>
    <div class="sec-title">전체 랭킹</div>
    <div class="ranking-list" id="rankingList"><div class="loading">불러오는 중...</div></div>
    <!-- 추천도서 섹션 -->
    <div id="secList" style="display:none">
      <div style="margin-bottom:16px;">
        <div style="font-size:18px;font-weight:900;margin-bottom:4px;">📋 글모락 추천 도서</div>
        <div style="font-size:13px;color:var(--muted)">추천 목록 책은 승인 시 +50pt 보너스! 🌟</div>
      </div>
      <div id="listProgress" style="margin-bottom:20px;"></div>
      <div id="listContent"></div>
    </div>
  </div>
  <div class="bottom-tab">
    <button class="tab-btn active" id="tabHome"><span class="tab-icon">🏠</span>홈</button>
    <button class="tab-btn" id="tabBook"><span class="tab-icon">📚</span>내 책장</button>
    <button class="tab-btn" id="tabList"><span class="tab-icon">📋</span>추천도서</button>
    <button class="tab-btn" id="tabRank"><span class="tab-icon">🏆</span>랭킹</button>
  </div>
</div>

<!-- 책 등록 모달 -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">📖 읽은 책 등록</div>
    <div class="inp-group" style="position:relative">
      <div class="inp-label">책 제목</div>
      <input class="inp" type="text" id="bookTitle" placeholder="예: 소나기" autocomplete="off">
      <div id="bookSuggest" style="display:none;position:absolute;top:100%;left:0;right:0;background:var(--surface2);border:1px solid var(--border);border-radius:12px;z-index:100;max-height:240px;overflow-y:auto;box-shadow:0 4px 20px rgba(0,0,0,0.15);"></div>
    </div>
    <div class="inp-group"><div class="inp-label">지은이</div><input class="inp" type="text" id="bookAuthor" placeholder="예: 황순원"></div>
    <div class="inp-group"><div class="inp-label">한 줄 감상</div><input class="inp" type="text" id="bookReview" placeholder="책을 읽고 느낀 점을 써보세요"></div>
    <div class="inp-group"><div class="inp-label">✍️ 인상 깊었던 문장 <span style="color:var(--muted);font-size:11px">(선택)</span></div><input class="inp" type="text" id="bookQuote" placeholder="예: 나는 아직 살아있다."></div>
    <div class="inp-group">
      <div class="inp-label">⭐ 나의 별점</div>
      <div class="star-group" id="starGroup">
        <button class="star-btn" data-v="1">⭐</button>
        <button class="star-btn" data-v="2">⭐</button>
        <button class="star-btn" data-v="3">⭐</button>
        <button class="star-btn" data-v="4">⭐</button>
        <button class="star-btn" data-v="5">⭐</button>
      </div>
    </div>
    <button class="btn-primary" id="btnSubmitBook">✨ 선생님께 제출하기</button>
    <button class="btn-cancel" id="btnCancelModal">취소</button>
  </div>
</div>

<div class="approval-popup" id="approvalPopup">
  <div class="approval-box">
    <div class="popup-emoji">🎉</div>
    <div class="popup-title">책 승인됐어요!</div>
    <div class="popup-book" id="popupBook"></div>
    <div class="popup-pts" id="popupPts"></div>
    <button class="popup-btn" onclick="document.getElementById('approvalPopup').classList.remove('show')">확인!</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, collection, addDoc, query, where, orderBy, onSnapshot, getDocs } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB_f-U4h2PMzDv2zHhH0AEtffr3XfGYxsQ",
  authDomain: "chaek-mabeopsa.firebaseapp.com",
  projectId: "chaek-mabeopsa",
  storageBucket: "chaek-mabeopsa.firebasestorage.app",
  messagingSenderId: "957424809777",
  appId: "1:957424809777:web:7a67c94015066703d32210"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const TITLES = [[0,'📖 독서 시작'],[100,'🌱 새싹 독자'],[300,'📚 책 애호가'],[600,'🔮 현자 견습'],[1000,'✨ 책의 현자'],[1500,'🧙 책의 마법사'],[2200,'🧝 대마법사'],[3000,'👑 책의 왕']];
const EMOJIS = ['📖','🌱','📚','🔮','✨','🧙','🧝','👑'];
const COVERS = ['c1','c2','c3','c4'];

};
const ALL_GEULMOAK = Object.values(GEULMOAK_BOOKS).flat();
const BONUS_PTS = 50;

function isGeulmoak(title) {
  return ALL_GEULMOAK.some(b => title.includes(b) || b.includes(title));
}
function getGeulmoakSeries(title) {
  for(const [series, books] of Object.entries(GEULMOAK_BOOKS)) {
    if(books.some(b => title.includes(b) || b.includes(title))) return series;
  }
  return null;
}
function getLv(pts) { let l=0; for(const [t] of TITLES){if(pts>=t)l++;} return Math.min(Math.max(l,1),8); }
function getTitle(pts) { let r=TITLES[0][1]; for(const [t,title] of TITLES){if(pts>=t)r=title;} return r; }
function getXP(pts) {
  const th=TITLES.map(t=>t[0]);
  let cur=0,next=200;
  for(let i=0;i<th.length-1;i++){if(pts>=th[i]&&pts<th[i+1]){cur=th[i];next=th[i+1];break;}}
  return {cur:pts-cur, max:next-cur};
}

function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}
function showScreen(id) {
  ['loginScreen','signupScreen','appScreen'].forEach(s=>{
    const el=document.getElementById(s);
    el.classList.remove('on');
  });
  const target=document.getElementById(id==='app'?'appScreen':id);
  target.classList.add('on');
}

let currentUser=null, userData=null;

onAuthStateChanged(auth, async user=>{
  if(user){
    currentUser=user;
    showScreen('app');
    await loadUser(user.uid);
    loadBooks(user.uid);
    loadRanking(user.uid);
  } else {
    currentUser=null;
    showScreen('loginScreen');
  }
});

async function loadUser(uid){
  const snap=await getDoc(doc(db,'users',uid));
  if(!snap.exists()) return;
  userData=snap.data();
  const pts=userData.points||0, lv=getLv(pts), xp=getXP(pts);
  document.getElementById('myAvatar').innerHTML=EMOJIS[lv-1]+`<div class="lv-badge">Lv.${lv}</div>`;
  document.getElementById('myName').textContent=userData.name||'학생';
  document.getElementById('myTitle').textContent=getTitle(pts);
  document.getElementById('statBooks').textContent=userData.booksRead||0;
  document.getElementById('statPts').textContent=pts.toLocaleString();
  document.getElementById('statRemain').textContent=userData.booksRemaining??'-';
  document.getElementById('xpText').textContent=xp.cur+' / '+xp.max+' XP';
  setTimeout(()=>{ document.getElementById('xpFill').style.width=Math.round((xp.cur/xp.max)*100)+'%'; },100);
}

function loadBooks(uid){
  let firstLoad=true;
  const seenApproved=new Set();
  const q=query(collection(db,'books'),where('userId','==',uid),orderBy('createdAt','desc'));
  onSnapshot(q,snap=>{
    const el=document.getElementById('bookList');
    if(snap.empty){el.innerHTML='<div class="empty-state">📚 아직 등록한 책이 없어요!<br>첫 번째 책을 등록해보세요.</div>';firstLoad=false;return;}
    el.innerHTML='';
    snap.forEach((d,i)=>{
      const b=d.data();
      // 승인 알림: 첫 로드 후 새로 approved 된 것만
      if(!firstLoad && b.status==='approved' && !seenApproved.has(d.id)){
        document.getElementById('popupBook').textContent='《'+b.title+'》';
        document.getElementById('popupPts').textContent='+'+(b.pointsAwarded||b.points||100)+' pt 획득! ⭐';
        document.getElementById('approvalPopup').classList.add('show');
        loadUser(uid);
      }
      if(b.status==='approved') seenApproved.add(d.id);
      const div=document.createElement('div');
      div.className='book-item';
      div.innerHTML=`<div class="book-cover ${COVERS[i%4]}">📖</div>
        <div class="book-meta">
          <div class="book-title-text">${b.title}</div>
          <div class="book-author">${b.author||''}</div>
          <div class="book-pts">⭐ ${b.pointsAwarded?'+'+b.pointsAwarded+' 포인트':b.points?'+'+b.points+' 포인트':'승인 대기 중'}</div>
          ${b.teacherComment ? `<div style="font-size:11px;color:#a07ee0;margin-top:3px;">💬 "${b.teacherComment}"</div>` : ''}
        </div>
        <div class="book-status ${b.status==='approved'?'s-ok':'s-wait'}">${b.status==='approved'?'승인완료':'승인대기'}</div>`;
      el.appendChild(div);
    });
    firstLoad=false;
  });
}

async function loadRanking(myUid){
  const snap=await getDocs(query(collection(db,'users'),orderBy('points','desc')));
  const el=document.getElementById('rankingList');
  if(snap.empty){el.innerHTML='<div class="empty-state">아직 등록된 학생이 없어요!</div>';return;}
  el.innerHTML='';
  const medals=['🥇','🥈','🥉'];
  const cls=['r1','r2','r3'];
  snap.forEach((d,i)=>{
    const u=d.data(), isMe=d.id===myUid, lv=getLv(u.points||0);
    const div=document.createElement('div');
    div.className='rank-item'+(isMe?' me':'');
    const rn=i<3?`<div class="rank-num ${cls[i]}">${medals[i]}</div>`:`<div class="rank-num r-etc">${i+1}</div>`;
    div.innerHTML=`${rn}
      <div class="rank-avatar" style="background:${BG[i%4]}">${EMOJIS[lv-1]}</div>
      <div style="flex:1">
        <div style="font-size:14px;font-weight:700">${u.name||'학생'}${isMe?' <span style="font-size:11px;color:var(--purple2)">(나)</span>':''}</div>
        <div style="font-size:11px;color:var(--muted)">Lv.${lv} · ${getTitle(u.points||0)}</div>
      </div>
      <div class="rank-score">${(u.points||0).toLocaleString()}</div>`;
    el.appendChild(div);
    if(isMe) document.getElementById('myRank').textContent='🏆 전체 '+(i+1)+'위';
  });
}

const KAKAO_KEY = 'e47f4fe1adaafe2c946d161b6f49d107';
let searchTimer = null;

document.getElementById('bookTitle').addEventListener('input', e => {
  clearTimeout(searchTimer);
  const q = e.target.value.trim();
  const suggest = document.getElementById('bookSuggest');
  if(q.length < 2) { suggest.style.display='none'; return; }
  searchTimer = setTimeout(async () => {
    try {
      const res = await fetch(`https://dapi.kakao.com/v3/search/book?query=${encodeURIComponent(q)}&size=5`, {
        headers: { 'Authorization': `KakaoAK ${KAKAO_KEY}` }
      });
      const data = await res.json();
      if(!data.documents?.length) { suggest.style.display='none'; return; }
      suggest.style.display='block';
      suggest.innerHTML = data.documents.map(b => `
        <div class="book-suggest-item" style="display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--border);"
          data-title="${b.title}" data-author="${b.authors?.[0]||''}" data-thumb="${b.thumbnail||''}">
          ${b.thumbnail ? `<img src="${b.thumbnail}" style="width:36px;height:50px;object-fit:cover;border-radius:4px;flex-shrink:0">` : '<div style="width:36px;height:50px;background:var(--border);border-radius:4px;flex-shrink:0"></div>'}
          <div>
            <div style="font-size:13px;font-weight:700;margin-bottom:2px">${b.title}</div>
            <div style="font-size:11px;color:var(--muted)">${b.authors?.[0]||''}</div>
          </div>
        </div>`).join('');
      suggest.querySelectorAll('.book-suggest-item').forEach(item => {
        item.addEventListener('click', () => {
          document.getElementById('bookTitle').value = item.dataset.title;
          document.getElementById('bookAuthor').value = item.dataset.author;
          suggest.style.display='none';
        });
        item.addEventListener('mouseover', () => item.style.background='var(--purple-light)');
        item.addEventListener('mouseout', () => item.style.background='');
      });
    } catch(e) { suggest.style.display='none'; }
  }, 300);
});
document.addEventListener('click', e => {
  if(!e.target.closest('#bookTitle') && !e.target.closest('#bookSuggest'))
    document.getElementById('bookSuggest').style.display='none';
});

let selectedStar = 0;
document.getElementById('starGroup').addEventListener('click', e => {
  const btn = e.target.closest('.star-btn');
  if(!btn) return;
  selectedStar = parseInt(btn.dataset.v);
  document.querySelectorAll('.star-btn').forEach(b => {
    b.classList.toggle('on', parseInt(b.dataset.v) <= selectedStar);
  });
});

document.getElementById('btnSubmitBook').addEventListener('click', async()=>{
  const title=document.getElementById('bookTitle').value.trim();
  const author=document.getElementById('bookAuthor').value.trim();
  const review=document.getElementById('bookReview').value.trim();
  const quote=document.getElementById('bookQuote').value.trim();
  if(!title){showToast('📖 책 제목을 입력해주세요!');return;}
  const geulmoak = isGeulmoak(title);
  const series = getGeulmoakSeries(title);
  try{
    await addDoc(collection(db,'books'),{
      userId:currentUser.uid, userName:userData?.name||'학생',
      title,author,review,quote, starRating: selectedStar||0, status:'pending', points:0,
      isGeulmoak: geulmoak, series: series||'',
      createdAt:new Date()
    });
    document.getElementById('modal').classList.remove('open');
    document.getElementById('bookTitle').value='';
    document.getElementById('bookAuthor').value='';
    document.getElementById('bookReview').value='';
    document.getElementById('bookQuote').value='';
    selectedStar=0;
    document.querySelectorAll('.star-btn').forEach(b=>b.classList.remove('on'));
    if(geulmoak) showToast('🌟 추천 도서 제출! 승인 시 +50pt 보너스!');
    else showToast('🎉 선생님께 제출했어요! 승인을 기다려요~');
  } catch(e){ showToast('오류가 발생했어요. 다시 시도해주세요.'); }
});

async function renderChecklist() {
  if(!currentUser) return;
  const snap = await getDocs(query(collection(db,'books'), where('userId','==',currentUser.uid), where('status','==','approved')));
  const readTitles = new Set(snap.docs.map(d=>d.data().title));

  let totalRead=0, totalAll=0;
  let html='';
  for(const [series, books] of Object.entries(GEULMOAK_BOOKS)) {
    const readCount = books.filter(b => [...readTitles].some(r=>r.includes(b)||b.includes(r))).length;
    totalRead+=readCount; totalAll+=books.length;
    const pct = Math.round((readCount/books.length)*100);
    html+=`<div style="margin-bottom:20px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <div style="font-size:14px;font-weight:700">${series}</div>
        <div style="font-size:12px;color:var(--purple2)">${readCount}/${books.length}권</div>
      </div>
      <div style="height:6px;background:var(--border);border-radius:10px;margin-bottom:10px;">
        <div style="height:6px;background:linear-gradient(90deg,var(--purple),var(--purple2));border-radius:10px;width:${pct}%;transition:width 0.5s"></div>
      </div>
      <div style="display:flex;flex-direction:column;gap:6px;">
        ${books.map(b=>{
          const done=[...readTitles].some(r=>r.includes(b)||b.includes(r));
          return `<div style="display:flex;align-items:center;gap:10px;padding:8px 12px;background:${done?'rgba(124,92,191,0.15)':'var(--surface)'};border:1px solid ${done?'var(--purple2)':'var(--border)'};border-radius:10px;">
            <div style="font-size:16px">${done?'✅':'⬜'}</div>
            <div style="font-size:13px;font-weight:${done?700:400};color:${done?'var(--text)':'var(--muted)'}">${b}</div>
            ${done?'<div style="margin-left:auto;font-size:11px;color:var(--purple2)">완독!</div>':''}
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }

  // 진행률
  const pct = Math.round((totalRead/totalAll)*100);
  const badge = totalRead>=10?'🎖️ 고전 입문':totalRead>=30?'📜 고전 탐험가':totalRead>=60?'👑 고전 마스터':'';
  document.getElementById('listProgress').innerHTML=`
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px 16px;">
      <div style="display:flex;justify-content:space-between;margin-bottom:8px;">
        <div style="font-weight:700">전체 진행률</div>
        <div style="color:var(--gold);font-weight:900">${totalRead}/${totalAll}권 (${pct}%)</div>
      </div>
      <div style="height:8px;background:var(--border);border-radius:10px;">
        <div style="height:8px;background:linear-gradient(90deg,var(--gold),var(--purple2));border-radius:10px;width:${pct}%"></div>
      </div>
      ${badge?`<div style="margin-top:10px;font-size:13px;color:var(--gold)">🏅 뱃지: ${badge}</div>`:''}
    </div>`;
  document.getElementById('listContent').innerHTML=html;
}
