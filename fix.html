<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>포인트 수동 지급</title>
<style>
  body { font-family: 'Noto Sans KR', sans-serif; background:#f4f3ff; display:flex; align-items:center; justify-content:center; min-height:100vh; padding:20px; }
  .box { background:white; border-radius:20px; padding:28px; max-width:400px; width:100%; box-shadow:0 4px 20px rgba(0,0,0,0.1); }
  h2 { font-size:18px; font-weight:900; margin-bottom:20px; color:#1a1a2e; }
  .info { background:#f9f8ff; border-radius:10px; padding:12px 14px; margin-bottom:16px; font-size:13px; line-height:1.8; color:#444; }
  .info strong { color:#7c5cbf; }
  button { width:100%; padding:14px; background:#7c5cbf; color:white; border:none; border-radius:12px; font-size:15px; font-weight:700; cursor:pointer; margin-bottom:10px; }
  button:disabled { opacity:0.5; }
  .result { margin-top:12px; font-size:14px; font-weight:700; text-align:center; min-height:24px; }
  .ok { color:#16a34a; }
  .err { color:#dc2626; }
</style>
</head>
<body>
<div class="box">
  <h2>🔧 포인트 수동 지급</h2>
  <div class="info">
    <strong>학생:</strong> 허준범<br>
    <strong>책:</strong> 나는 설탕으로 만들어지지 않았다<br>
    <strong>지급할 포인트:</strong> +100pt<br>
    <strong>userId:</strong> jDtRISURqMVqBK4NS9HZ3DRwtzT2
  </div>
  <button id="btnFix">💰 허준범 +100pt 지급하기</button>
  <button id="btnCheck" style="background:#6b7280;">🔍 현재 포인트 확인</button>
  <div class="result" id="result"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyB_f-U4h2PMzDv2zHhH0AEtffr3XfGYxsQ",
  authDomain: "chaek-mabeopsa.firebaseapp.com",
  projectId: "chaek-mabeopsa",
  storageBucket: "chaek-mabeopsa.firebasestorage.app",
  messagingSenderId: "957424809777",
  appId: "1:957424809777:web:7a67c94015066703d32210"
});
const auth = getAuth(app);
const db = getFirestore(app);

const TARGET_UID = 'jDtRISURqMVqBK4NS9HZ3DRwtzT2';
const ADD_PTS = 100;

// 로그인 먼저
const email = prompt('교장 이메일 입력:');
const pw = prompt('비밀번호 입력:');
try {
  await signInWithEmailAndPassword(auth, email, pw);
  document.getElementById('result').textContent = '✅ 로그인 성공!';
  document.getElementById('result').className = 'result ok';
} catch(e) {
  document.getElementById('result').textContent = '❌ 로그인 실패: ' + e.message;
  document.getElementById('result').className = 'result err';
}

document.getElementById('btnCheck').onclick = async () => {
  const snap = await getDoc(doc(db,'users',TARGET_UID));
  if(snap.exists()) {
    const pts = snap.data().points || 0;
    const books = snap.data().booksRead || 0;
    document.getElementById('result').textContent = `허준범 현재: ${pts}pt, 읽은책 ${books}권`;
    document.getElementById('result').className = 'result ok';
  } else {
    document.getElementById('result').textContent = '❌ 해당 UID로 유저를 찾을 수 없어요!';
    document.getElementById('result').className = 'result err';
  }
};

document.getElementById('btnFix').onclick = async () => {
  const btn = document.getElementById('btnFix');
  btn.disabled = true;
  btn.textContent = '⏳ 처리 중...';
  try {
    const snap = await getDoc(doc(db,'users',TARGET_UID));
    if(!snap.exists()) {
      document.getElementById('result').textContent = '❌ 유저를 찾을 수 없어요! UID 확인 필요';
      document.getElementById('result').className = 'result err';
      btn.disabled = false; btn.textContent = '💰 허준범 +100pt 지급하기';
      return;
    }
    const cur = snap.data().points || 0;
    const curBooks = snap.data().booksRead || 0;
    await updateDoc(doc(db,'users',TARGET_UID), {
      points: cur + ADD_PTS,
      booksRead: curBooks + 1
    });
    document.getElementById('result').textContent = `✅ 완료! ${cur}pt → ${cur+ADD_PTS}pt`;
    document.getElementById('result').className = 'result ok';
    btn.textContent = '✅ 완료!';
  } catch(e) {
    document.getElementById('result').textContent = '❌ 오류: ' + e.message;
    document.getElementById('result').className = 'result err';
    btn.disabled = false;
    btn.textContent = '💰 허준범 +100pt 지급하기';
  }
};
</script>
</body>
</html>
